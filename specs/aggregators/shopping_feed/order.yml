            allOf:
              - $ref: ./ticket.model.oas2.yml#/components/schemas/TicketLink
              - type: object
                properties:
                  report:
                    type: array
                    description: Only returned if orders in this request have been ignored. It contains a list of all affected orders along with the reason for which they've been ignored. Orders identifiers are returned the same way they've been originally queried (either `id` or `channelName` and `reference`).
                    items:
