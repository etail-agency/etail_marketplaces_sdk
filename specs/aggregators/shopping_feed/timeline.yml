      security:
        - Token: []
    head:
      summary: Count Timeline Events
      description: |-
        ### Count the timeline events of your store

        How many timeline events does my store have? 
        You can call this endpoint to count the existing timeline events of your store.
      operationId: v1.store-timeline-information.head
      parameters:
        - name: storeId
          in: path
          description: The store ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Informations are located in the headers returned
          headers:
            X-Last-Request-Timestamp:
              description: Indicated when the last fetch query occurred
              schema:
                type: string
                format: date-time
            X-Last-Event-Timestamp:
              description: Indicate the last event date
              schema:
                type: string
                format: date-time
            X-New-Events-Count:
              description: Count the number of new events since last query
              schema:
                type: string
          content:
            application/hal+json:
              schema:
                type: object
      security:
        - Token: []
components:
  parameters:
    storeId:
      name: storeId
      in: path
      description: A store identifier you have access to.
      required: true
      schema:
        type: integer
  securitySchemes:
    Token:
      type: apiKey
      description: |-
        The Shopping Feed API uses Bearer Authentication.

        You must include an `Authorization` header when making requests to the API:

        > Authorization: Bearer *token*
        > 
        You can find your token on [your feed page](https://app.shopping-feed.com/tools/infos) in Shopping Feed.

        For example:

        > Authorization: Bearer abcdefghijklmnopqrstuvwxyz1234567890
      name: Authorization
      in: header
