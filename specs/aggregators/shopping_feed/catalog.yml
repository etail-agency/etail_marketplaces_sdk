openapi: 3.1.0
info:
  title: Catalog API
  contact:
    email: support@shopping-feed.com
  version: '1.0'
servers:
  - url: 'https://api.shopping-feed.com/'
security:
  - Token: []
tags:
  - name: Inventory
  - name: catalog
  - name: Operation
  - name: Pricing
  - name: Fields mapping
