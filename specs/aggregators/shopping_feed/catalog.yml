paths:
  '/v1/catalog/{catalogId}':
    get:
      tags:
        - Catalog
      summary: View Catalog
      description: |
        ### View your catalog, its statistics and enabled features

        Your *catalog* is the list of your products, in its source version (it is what exists on Shoppingfeed after your feed has been imported). 
        With this endpoint and your *Catalog ID*, you can get statistics about your catalog as it currently exists: the number of references, parent products and variant products.
        You can also view if a feature is enabled or not under the *feature* property 
      operationId: v1.catalog.get
      parameters:
        - name: catalogId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
        required: false
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                $ref: ./catalog.model.oas2.yml#/components/schemas/CatalogHal
        '401':
          $ref: '#/components/responses/UserNotAuthorized'
        '404':
          $ref: '#/components/responses/CatalogNotFound'
        '405':
          $ref: ./common.oas2.yml#/components/responses/405
      security:
        - Token: []
      x-private: true
      x-internal: false
      x-codegen-request-body-name: body
