  securitySchemes:
    Token:
      type: apiKey
      description: |-
        The Shopping Feed API uses Bearer Authentication.
        You must include an `Authorization` header when making requests to the API:
        > Authorization: Bearer *token* >  You can find your token on [your feed page](https://app.shopping-feed.com/tools/infos) in Shopping Feed.
        For example:
        > Authorization: Bearer abcdefghijklmnopqrstuvwxyz1234567890
      name: Authorization
      in: header
